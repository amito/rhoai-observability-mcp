# vLLM via KServe InferenceService for GPU observability demo
# Alternative to vllm-deployment.yaml — uses the RHOAI-native pattern:
#   ServingRuntime (defines the vLLM container) + InferenceService (references it)
#
# NOTE on service naming: KServe auto-generates services named
# "<isvc-name>-predictor" which avoids the VLLM_PORT env collision
# that the Deployment approach works around with "vllm-server".
#
# Usage:
#   oc apply -f vllm-inferenceservice.yaml
#   # Wait for the InferenceService to become Ready:
#   oc wait isvc/vllm --for=condition=Ready --timeout=300s -n vllm-demo

# --- ServingRuntime: defines the vLLM container runtime ---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: vllm-demo
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/port: "8000"
    prometheus.io/path: /metrics
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:latest
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      ports:
        - containerPort: 8000
          protocol: TCP
      env:
        - name: HF_HOME
          value: /tmp/hf-cache
        - name: TRANSFORMERS_CACHE
          value: /tmp/hf-cache
        - name: XDG_CACHE_HOME
          value: /tmp/hf-cache
      volumeMounts:
        - name: cache
          mountPath: /tmp/hf-cache
  volumes:
    - name: cache
      emptyDir: {}

---
# --- InferenceService: deploys the model using the runtime above ---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vllm
  namespace: vllm-demo
  labels:
    app: vllm
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      args:
        - --model=Qwen/Qwen2.5-0.5B-Instruct
        - --dtype=half
        - --gpu-memory-utilization=0.4
        - --max-model-len=32768
        - --max-num-seqs=128
        - --enforce-eager
        - --port=8000
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
          memory: "8Gi"
          cpu: "2"
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "vllm-workload"
        effect: "NoSchedule"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: type
                  operator: In
                  values:
                    - vllm-workload

---
# --- Route: exposes the predictor service externally ---
# RawDeployment mode does not auto-create a Route; this is needed for
# external access (e.g., browser, external GuideLLM jobs).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vllm-predictor
  namespace: vllm-demo
  labels:
    app: vllm
spec:
  to:
    kind: Service
    name: vllm-predictor
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
