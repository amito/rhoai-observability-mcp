# GuideLLM benchmark job — runs from an EXTERNAL cluster against the vLLM
# Route exposed on the target OpenShift cluster.
# NOTE: Uses "guidellm benchmark run" syntax (v0.5+).
# Replace VLLM_ROUTE_HOSTNAME with your actual Route host:
#   oc get route vllm-server -n vllm-demo -o jsonpath='{.spec.host}'
apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-bench-rampup
  namespace: vllm-demo
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: guidellm
          image: ghcr.io/vllm-project/guidellm:latest
          env:
            - name: GUIDELLM__OPENAI__API_KEY
              value: "not-needed"
          command:
            - guidellm
          args:
            - benchmark
            - run
            - --target=https://vllm-server-vllm-demo.apps.rosa.amoren-summit.cdsv.p3.openshiftapps.com/v1
            - --model=Qwen/Qwen2.5-0.5B-Instruct
            - --data=fka/prompts.chat
            - --profile=constant
            - --rate=100
            - --rampup=60
            - --max-seconds=600
            - --output-dir=/results
            - --outputs=benchmark-results.json
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: results
          emptyDir: {}
