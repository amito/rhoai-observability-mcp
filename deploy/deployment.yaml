apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhoai-obs-mcp
  labels:
    app: rhoai-obs-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhoai-obs-mcp
  template:
    metadata:
      labels:
        app: rhoai-obs-mcp
    spec:
      serviceAccountName: rhoai-obs-mcp
      containers:
        - name: mcp-server
          image: quay.io/rh-ee-amoren/rhoai-observability-mcp:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: "sse"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
